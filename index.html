<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LNG Daily Ops — WI-NGR-OPS-001</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f3; --surface: #ffffff; --border: #e2e0da; --text: #1a1916; --muted: #6b6860;
  --accent: #1a56db; --accent-bg: #eff4ff; --success: #057a55; --success-bg: #f0fdf4;
  --warn: #b45309; --warn-bg: #fffbeb; --danger: #dc2626; --danger-bg: #fef2f2;
  --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
.container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; text-align: center; max-width: 360px; width: 100%; box-shadow: var(--shadow); }
.auth-icon { font-size: 40px; margin-bottom: 1rem; }
.auth-card h1 { font-size: 20px; font-weight: 600; margin-bottom: .25rem; }
.auth-card p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
.google-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; cursor: pointer; justify-content: center; transition: background .15s; }
.google-btn:hover { background: var(--bg); }
.err-msg { font-size: 13px; color: var(--danger); margin-top: .75rem; min-height: 18px; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; }
.user-row { display: flex; align-items: center; gap: 8px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.user-name { font-size: 13px; font-weight: 500; }
.signout { font-size: 12px; color: var(--muted); cursor: pointer; border: none; background: none; padding: 4px 8px; border-radius: 6px; font-family: inherit; }
.signout:hover { background: var(--bg); }
.datebar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 13px; }
.datebar span:last-child { font-weight: 500; }
.app-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
.app-tab { padding: 7px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; transition: all .15s; }
.app-tab.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); font-weight: 500; }
.view { display: none; }
.view.active { display: block; }
.step-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: .75rem; }
.tab-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--muted); font-size: 12px; font-family: inherit; cursor: pointer; transition: all .15s; }
.tab-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
.prog-wrap { background: var(--border); border-radius: 20px; height: 4px; margin-bottom: 1.25rem; }
.prog-bar { height: 4px; border-radius: 20px; background: var(--accent); transition: width .35s ease; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.card-sub { font-size: 12px; font-weight: 600; color: var(--muted); margin: .875rem 0 .5rem; text-transform: uppercase; letter-spacing: .04em; }
.time-tag { font-size: 11px; font-weight: 400; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 20px; }
.wi-ref { font-size: 10px; color: var(--accent); background: var(--accent-bg); border-radius: 3px; padding: 1px 5px; margin-left: 3px; font-family: 'IBM Plex Mono', monospace; }
.field { margin-bottom: .875rem; }
.label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; font-weight: 500; }
.req { color: var(--danger); margin-left: 2px; }
input[type=text], input[type=number], input[type=time], textarea, select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: all .15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.status-display { padding: 8px 10px; font-size: 13px; border-radius: 8px; background: var(--bg); color: var(--muted); transition: all 0.2s; }
.pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.pill-ok { background: var(--success-bg); color: var(--success); }
.pill-warn { background: var(--warn-bg); color: var(--warn); }
.pill-danger { background: var(--danger-bg); color: var(--danger); }
.check-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: background .1s; }
.check-item:hover { background: var(--bg); }
.check-item.done { background: var(--success-bg); border-color: #bbf7d0; }
.check-item input[type=checkbox] { width: 15px; height: 15px; flex-shrink: 0; accent-color: var(--success); margin-top: 3px; }
.check-label { font-size: 13px; line-height: 1.45; }
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: .875rem; }
.alert-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid #fde68a; }
.alert-info { background: var(--accent-bg); color: var(--accent); border: 1px solid #bfdbfe; }
.alert-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #fca5a5; }
.nav { display: flex; justify-content: space-between; margin-top: 1.25rem; gap: 8px; }
.nav-btn { flex: 1; padding: 9px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; transition: background .15s; }
.nav-btn:hover { background: var(--bg); }
.nav-btn.primary { border-color: var(--accent); color: var(--accent); font-weight: 500; }
.save-btn { width: 100%; padding: 11px; border: 1px solid var(--accent); border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 1rem; transition: opacity .15s; }
.save-btn:hover { opacity: .9; }
.save-btn:disabled { opacity: .5; cursor: not-allowed; }
.save-status { text-align: center; font-size: 13px; margin-top: .5rem; min-height: 20px; }
.save-ok { color: var(--success); }
.save-err { color: var(--danger); }
hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.metric { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.metric-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
.metric-val { font-size: 20px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
.metric-unit { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 2px; }
.imb-display, .var-display { padding: 8px 10px; font-size: 14px; font-weight: 600; border-radius: 8px; background: var(--bg); font-family: 'IBM Plex Mono', monospace; transition: all 0.2s;}
.hist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.hist-title { font-size: 15px; font-weight: 600; }
.refresh-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--muted); font-size: 12px; font-family: inherit; cursor: pointer; }
.hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; box-shadow: var(--shadow); }
.hist-card:hover { border-color: var(--accent); }
.hist-date { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.hist-by { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 6px; }
.hist-row { display: flex; gap: 14px; flex-wrap: wrap; }
.hist-item { font-size: 12px; color: var(--muted); }
.hist-item strong { color: var(--text); font-weight: 500; }
.hist-detail { background: var(--accent-bg); border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; display: none; }
.hist-detail.open { display: block; }
.det-title { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; margin-top: .75rem; }
.det-title:first-child { margin-top: 0; }
.det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.det-field { font-size: 13px; }
.det-field span { color: var(--muted); }
.hist-empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 14px; }
.loading-text { text-align: center; padding: 1.5rem; color: var(--muted); font-size: 14px; }
@media (max-width: 480px) { .row3 { grid-template-columns: 1fr 1fr; } .metric-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="auth-wrap" id="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">⛽</div>
    <h1>LNG Daily Operations</h1>
    <p>WI-NGR-OPS-001 · Supply LNG to CFP Project (130 MMSCFD)</p>
    <button class="google-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="err-msg" id="auth-err"></div>
  </div>
</div>

<div class="container" id="main-app" style="display:none">
  <div class="topbar">
    <div class="user-row">
      <div class="avatar" id="user-av">—</div>
      <span class="user-name" id="user-nm">—</span>
    </div>
    <button class="signout" onclick="doSignOut()">ออกจากระบบ</button>
  </div>
  <div class="datebar">
    <span style="color:var(--muted);font-size:12px">วันที่</span>
    <span id="today-date"></span>
  </div>
  <div class="app-tabs">
    <button class="app-tab active" onclick="switchTab('form')">กรอกข้อมูลวันนี้</button>
    <button class="app-tab" onclick="switchTab('history')">ประวัติย้อนหลัง</button>
  </div>

  <div class="view active" id="view-form">
    <div class="step-tabs">
      <button class="tab-btn active" onclick="goStep(0)">1 · Morning</button>
      <button class="tab-btn" onclick="goStep(1)">2 · Daytime</button>
      <button class="tab-btn" onclick="goStep(2)">3 · Evening</button>
      <button class="tab-btn" onclick="goStep(3)">4 · Overnight</button>
      <button class="tab-btn" onclick="goStep(4)">สรุป & บันทึก</button>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:20%"></div></div>

    <div class="section active" id="s0">
      <div class="card">
        <div class="card-title">Morning Preparation <span class="time-tag">06:00–08:00</span></div>
        <div class="card-sub">§1.1 System Status Check</div>
        <div class="row2">
          <div class="field"><label class="label">Tank Inventory (%) <span class="wi-ref">TUA</span><span class="req">*</span></label><input type="number" id="tank_inv" placeholder="%" step="0.01" oninput="chkTank()"></div>
          <div class="field"><label class="label">สถานะ Tank</label><div class="status-display" id="tank-st">รอกรอกข้อมูล</div></div>
        </div>
        <div class="row2">
          <div class="field"><label class="label">Pipeline Pressure (bar) <span class="wi-ref">TSA</span><span class="req">*</span></label><input type="number" id="pipe_press" placeholder="bar" step="0.1"></div>
          <div class="field"><label class="label">Flow Rate (MMSCFD)</label><input type="number" id="flow_rate" placeholder="MMSCFD" step="0.01"></div>
        </div>
        <div class="row2">
          <div class="field"><label class="label">Regasification Rate (MMSCFD)</label><input type="number" id="regas_rate" placeholder="MMSCFD" step="0.01"></div>
          <div class="field"><label class="label">CFP Demand Forecast (MMSCFD) <span class="wi-ref">รับก่อน 06:30</span><span class="req">*</span></label><input type="number" id="cfp_demand" placeholder="MMSCFD" step="0.01"></div>
        </div>
        <hr>
        <div class="card-sub">§1.2 Daily Nomination</div>
        <div class="row3">
          <div class="field"><label class
